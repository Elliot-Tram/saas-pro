  <!-- Manche vertical -->
  <line x1="60" y1="108" x2="60" y2="62" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Poils du hérisson - éventail depuis le centre -->
  <line x1="60" y1="62" x2="60" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="46" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="74" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="32" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="88" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="20" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="100" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="14" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="106" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="14" y2="66" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="106" y2="66" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
