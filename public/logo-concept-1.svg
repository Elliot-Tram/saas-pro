<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Concept 1: Hérisson rond stylisé (vue du dessus) avec manche -->
  <!-- Fond rond -->
  <circle cx="60" cy="60" r="56" fill="#0f2b46"/>

  <!-- Hérisson - cercle central -->
  <circle cx="60" cy="50" r="18" fill="none" stroke="white" stroke-width="3"/>

  <!-- Poils du hérisson - rayons autour du cercle -->
  <line x1="60" y1="28" x2="60" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="30" x2="77" y2="23" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="38" x2="87" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="90" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="62" x2="87" y2="66" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="70" x2="77" y2="77" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="30" x2="43" y2="23" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="33" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="30" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="33" y2="66" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="70" x2="43" y2="77" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="72" x2="60" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Manche -->
  <line x1="60" y1="50" x2="60" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
